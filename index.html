<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>都市终端 - 双向链路中枢 (WebBLE)</title>
    <style>
        :root {
            --main-color: #0ff;
            --bg-color: #050505;
            --danger-color: #f03;
            --panel-bg: #0a1111;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--main-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h2 {
            border-bottom: 2px solid var(--main-color);
            padding-bottom: 10px;
            width: 100%;
            text-align: center;
            margin-top: 10px;
        }

        .status-box {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid var(--main-color);
            padding: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .btn {
            background: transparent;
            color: var(--main-color);
            border: 1px solid var(--main-color);
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:active {
            background: var(--main-color);
            color: #000;
        }

        .btn-danger {
            color: var(--danger-color);
            border-color: var(--danger-color);
            padding: 5px 10px;
            width: auto;
            font-size: 18px;
            margin: 0;
        }

        .btn-danger:active {
            background: var(--danger-color);
            color: #fff;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px dashed var(--main-color);
            padding: 15px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
        }

        .panel-title {
            font-size: 14px;
            color: #888;
            border-bottom: 1px dashed #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }

        .input-row label {
            font-size: 14px;
            width: 35%;
            color: #aaa;
        }

        .input-box {
            background: #000;
            color: var(--main-color);
            border: 1px solid #333;
            padding: 8px;
            width: 65%;
            font-size: 14px;
            font-family: inherit;
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1) hue-rotate(180deg) brightness(2);
        }

        /* 同步列表专属样式 */
        .list-item {
            border: 1px solid #005555;
            background: #001111;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info {
            font-size: 14px;
            line-height: 1.4;
        }

        .item-time {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Terminal Uplink</h2>
    <div class="status-box" id="statusBox" onclick="connectBLE()">
        SYS_STATUS: OFFLINE<br><span style="font-size: 12px; color: #888;">(CLICK TO ESTABLISH LINK)</span>
    </div>

    <div class="panel">
        <div class="panel-title"><span>>> TXT OVERRIDE (强制打断)</span></div>
        <input type="text" class="input-box" id="txt_msg" style="width: 100%; margin-bottom: 10px;" value="有内鬼,终止交易!">
        <button class="btn" onclick="sendRaw('TXT:' + document.getElementById('txt_msg').value)">发送指令</button>
    </div>

    <div class="panel">
        <div class="panel-title"><span>>> ALARM MATRIX (唤醒调度)</span><span onclick="sendRaw('GET:SYNC')"
                style="cursor:pointer; color:var(--main-color)">[ 刷新 ]</span></div>
        <div id="alarm_list_container"></div>
        <div style="border-top: 1px dashed #333; padding-top: 10px; margin-top: 10px;">
            <div class="input-row"><label>时间:</label><input type="time" class="input-box" id="alm_time" value="08:00">
            </div>
            <div class="input-row"><label>代号:</label><input type="text" class="input-box" id="alm_name" value="早间唤醒">
            </div>
            <div class="input-row"><label>指令:</label><input type="text" class="input-box" id="alm_text"
                    value="至..睡眠者...脱离休眠，立刻起床"></div>
            <button class="btn" onclick="addAlarm()">+ 添加并同步到终端</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title"><span>>> SCHEDULE (长期日程)</span><span onclick="sendRaw('GET:SYNC')"
                style="cursor:pointer; color:var(--main-color)">[ 刷新 ]</span></div>
        <div id="sch_list_container"></div>
        <div style="border-top: 1px dashed #333; padding-top: 10px; margin-top: 10px;">
            <div class="input-row"><label>时空:</label><input type="datetime-local" class="input-box" id="sch_time"></div>
            <div class="input-row"><label>标题:</label><input type="text" class="input-box" id="sch_name" value="去开会">
            </div>
            <div class="input-row"><label>内容:</label><input type="text" class="input-box" id="sch_text"
                    value="至..大忙人...十五分钟内到会议室"></div>
            <button class="btn" onclick="addSchedule()">+ 登记并同步到终端</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title"><span>>> POMODORO (专注预设)</span></div>
        <div class="input-row"><label>槽位:</label><select class="input-box" id="pom_slot">
                <option value="0">槽位 0</option>
                <option value="1">槽位 1</option>
                <option value="2">槽位 2</option>
            </select></div>
        <div class="input-row"><label>名称:</label><input type="text" class="input-box" id="pom_name" value="请专注">
        </div>
        <div class="input-row"><label>专注(分):</label><input type="number" class="input-box" id="pom_work" value="45">
        </div>
        <div class="input-row"><label>休息(分):</label><input type="number" class="input-box" id="pom_rest" value="10">
        </div>
        <button class="btn" onclick="updatePom()">覆盖该槽位并重载</button>
    </div>

    <script>
        let bleCharacteristic = null;
        const SERVICE_UUID = "0000dead-0000-1000-8000-00805f9b34fb";
        const CHAR_UUID = "0000beef-0000-1000-8000-00805f9b34fb";

        // 用于存储从终端拉取的数据
        let terminalAlarms = [];
        let terminalSchedules = [];

        window.onload = () => {
            let now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset() + 60);
            document.getElementById('sch_time').value = now.toISOString().slice(0, 16);
        };

        async function connectBLE() {
            const statusBox = document.getElementById('statusBox');
            try {
                statusBox.innerHTML = "SYS_STATUS: CONNECTING...<br><span style='font-size: 12px; color: #ff0;'>[AWAITING PAIRING]</span>";
                const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'Terminal_01' }], optionalServices: [SERVICE_UUID] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHAR_UUID);

                // 【核心新增】：开启监听，并主动拉取硬盘数据！
                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', handleRX);

                statusBox.innerHTML = "SYS_STATUS: ONLINE<br><span style='font-size: 12px; color: #0f0;'>[SYNCING DATABASE...]</span>";
                statusBox.style.borderColor = "#0f0"; statusBox.style.color = "#0f0";

                // 连接成功后，立刻要求全盘同步
                setTimeout(() => sendRaw('GET:SYNC'), 500);

                device.addEventListener('gattserverdisconnected', () => {
                    bleCharacteristic = null; statusBox.innerHTML = "SYS_STATUS: OFFLINE<br><span style='font-size: 12px; color: #f03;'>[CONNECTION LOST]</span>"; statusBox.style.borderColor = "#f03"; statusBox.style.color = "#f03";
                });
            } catch (error) { alert("连接失败: " + error.message); }
        }

        // 处理单片机发来的数据流
        function handleRX(event) {
            let val = new TextDecoder().decode(event.target.value);
            console.log("RX: ", val);
            if (val === "SYNC:CLEAR") {
                terminalAlarms = []; terminalSchedules = []; renderUI();
            } else if (val.startsWith("SYNC:ALM:")) {
                try { terminalAlarms.push(JSON.parse(val.substring(9))); renderUI(); } catch (e) { }
            } else if (val.startsWith("SYNC:SCH:")) {
                try { terminalSchedules.push(JSON.parse(val.substring(9))); renderUI(); } catch (e) { }
            }
        }

        // 图形化渲染列表
        function renderUI() {
            // 渲染闹钟列表
            let almHtml = terminalAlarms.length === 0 ? "<div style='color:#555; text-align:center; font-size:12px;'>( 终端目前无闹钟 )</div>" : "";
            terminalAlarms.forEach(a => {
                let hh = String(a.h).padStart(2, '0'); let mm = String(a.m).padStart(2, '0');
                almHtml += `<div class="list-item">
                    <div class="item-info"><span class="item-time">${hh}:${mm}</span> &nbsp; ${a.n}<br><span style="color:#666; font-size:12px;">${a.t}</span></div>
                    <button class="btn-danger" onclick="executeDelete('ALM_DEL:${a.n}')">✖</button>
                </div>`;
            });
            document.getElementById('alarm_list_container').innerHTML = almHtml;

            // 渲染日程列表
            let schHtml = terminalSchedules.length === 0 ? "<div style='color:#555; text-align:center; font-size:12px;'>( 终端目前无未过期的日程 )</div>" : "";
            terminalSchedules.forEach(s => {
                let niceDate = s.dt.replace('T', ' '); // 把 "YYYY-MM-DDTHH:MM" 变好看点
                schHtml += `<div class="list-item">
                    <div class="item-info"><span class="item-time">${niceDate}</span><br>📌 ${s.n}<br><span style="color:#666; font-size:12px;">${s.t}</span></div>
                    <button class="btn-danger" onclick="executeDelete('SCH_DEL:${s.n}')">✖</button>
                </div>`;
            });
            document.getElementById('sch_list_container').innerHTML = schHtml;
        }

        async function sendRaw(cmdStr) {
            if (!bleCharacteristic) return alert("未建立连接");
            try {
                await bleCharacteristic.writeValue(new TextEncoder().encode(cmdStr));
                document.body.style.backgroundColor = "#003333"; setTimeout(() => document.body.style.backgroundColor = "#050505", 100);
            } catch (error) { console.error(error); }
        }

        // ================= 快捷交互组 =================
        function executeDelete(cmd) {
            sendRaw(cmd);
            // 延时 500ms 等单片机删完硬盘，重新拉取全盘数据！(动态热重载)
            setTimeout(() => sendRaw('GET:SYNC'), 500);
        }

        function addAlarm() {
            let t = document.getElementById('alm_time').value; let n = document.getElementById('alm_name').value; let txt = document.getElementById('alm_text').value;
            let [h, m] = t.split(':'); sendRaw(`ALM:${h}:${m}:${n}:${txt}`);
            setTimeout(() => sendRaw('GET:SYNC'), 500);
        }

        function addSchedule() {
            let dt = document.getElementById('sch_time').value; let n = document.getElementById('sch_name').value; let txt = document.getElementById('sch_text').value;
            let [y, mo, d] = dt.split('T')[0].split('-'); let [h, m] = dt.split('T')[1].split(':');
            sendRaw(`SCH:${mo}:${d}:${h}:${m}:${n}:${txt}`);
            setTimeout(() => sendRaw('GET:SYNC'), 500);
        }

        function updatePom() {
            let slot = document.getElementById('pom_slot').value; let n = document.getElementById('pom_name').value; let w = document.getElementById('pom_work').value; let r = document.getElementById('pom_rest').value;
            sendRaw(`POM:${slot}:${n}:${w}:${r}`);
        }
    </script>
</body>

</html>
