<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>都市终端 - 双向链路中枢 (WebBLE)</title>
    <style>
        :root {
            --main-color: #0ff;
            --bg-color: #050505;
            --danger-color: #f03;
            --panel-bg: #0a1111;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--main-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        h2 {
            border-bottom: 2px solid var(--main-color);
            padding-bottom: 10px;
            width: 100%;
            text-align: center;
            margin-top: 20px;
        }

        /* 语言切换按钮样式 */
        #langToggle {
            position: absolute;
            top: 15px;
            right: 15px;
            width: auto;
            padding: 5px 15px;
            font-size: 14px;
            border-radius: 4px;
        }

        .status-box {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid var(--main-color);
            padding: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .btn {
            background: transparent;
            color: var(--main-color);
            border: 1px solid var(--main-color);
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:active {
            background: var(--main-color);
            color: #000;
        }

        .btn-danger {
            color: var(--danger-color);
            border-color: var(--danger-color);
            padding: 5px 10px;
            width: auto;
            font-size: 18px;
            margin: 0;
        }

        .btn-danger:active {
            background: var(--danger-color);
            color: #fff;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px dashed var(--main-color);
            padding: 15px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
        }

        .panel-title {
            font-size: 14px;
            color: #888;
            border-bottom: 1px dashed #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }

        .input-row label {
            font-size: 14px;
            width: 35%;
            color: #aaa;
        }

        .input-box {
            background: #000;
            color: var(--main-color);
            border: 1px solid #333;
            padding: 8px;
            width: 65%;
            font-size: 14px;
            font-family: inherit;
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1) hue-rotate(180deg) brightness(2);
        }

        .list-item {
            border: 1px solid #005555;
            background: #001111;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info {
            font-size: 14px;
            line-height: 1.4;
        }

        .item-time {
            color: #fff;
            font-weight: bold;
        }

        CSS

        /* ========================================== */
        /* 云端档案列表 Flex 排版与一键按钮样式 */
        /* ========================================== */
        .cloud-item {
            display: flex;
            /* 改为 Flex 布局，左右分栏 */
            border-left: 2px solid #088;
            margin-bottom: 6px;
            background: rgba(0, 30, 30, 0.3);
            transition: background 0.2s, border-left-color 0.2s;
        }

        .cloud-item:hover {
            background: rgba(0, 80, 80, 0.6);
            border-left-color: #0ff;
        }

        .cloud-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            font-size: 18px;
            font-weight: bold;
            border-right: 1px dashed #005555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cloud-action-btn.add {
            color: #0f0;
        }

        /* 绿色对勾 */
        .cloud-action-btn.add:hover {
            background: rgba(0, 255, 0, 0.2);
        }

        .cloud-action-btn.del {
            color: #f03;
        }

        /* 红色叉叉 */
        .cloud-action-btn.del:hover {
            background: rgba(255, 0, 51, 0.2);
        }

        .cloud-content-wrapper {
            flex: 1;
            padding: 8px;
            cursor: pointer;
        }

        /* ========================================== */
        /* 【新增】：云端档案库的小窗口样式 */
        /* ========================================== */
        #cloud_archive_window {
            height: 140px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #005555;
            padding: 5px;
            margin-bottom: 10px;
        }

        .cloud-item {
            border-left: 2px solid #088;
            padding: 8px;
            margin-bottom: 6px;
            background: rgba(0, 30, 30, 0.3);
            cursor: pointer;
            transition: background 0.2s, border-left-color 0.2s;
        }

        .cloud-item:hover {
            background: rgba(0, 80, 80, 0.6);
            border-left-color: #0ff;
        }

        .cloud-id {
            color: #088;
            font-size: 10px;
            margin-bottom: 4px;
        }

        .cloud-content {
            font-size: 13px;
            color: #ccc;
            line-height: 1.3;
        }

        /* 滚动条赛博化美化 */
        #cloud_archive_window::-webkit-scrollbar {
            width: 4px;
        }

        #cloud_archive_window::-webkit-scrollbar-track {
            background: #000;
        }

        #cloud_archive_window::-webkit-scrollbar-thumb {
            background: #088;
        }

        #cloud_archive_window::-webkit-scrollbar-thumb:hover {
            background: #0ff;
        }
    </style>
</head>

<body>

    <button id="langToggle" class="btn" onclick="toggleLanguage()">EN</button>
    <h2 data-i18n="title">Terminal Uplink</h2>

    <div class="status-box" id="statusBox" onclick="connectBLE()">
        SYS_STATUS: OFFLINE<br><span style="font-size: 12px; color: #888;" data-i18n="status_click">(点击建立链接)</span>
    </div>

    <div class="panel">
        <div class="panel-title"><span data-i18n="panel_txt">>> TXT OVERRIDE (强制打断)</span></div>
        <input type="text" class="input-box" id="txt_msg" style="width: 100%; margin-bottom: 10px;" value="有内鬼,终止交易！">
        <button class="btn" onclick="sendRaw('TXT:' + document.getElementById('txt_msg').value)"
            data-i18n="btn_txt">传递指令</button>
    </div>

    <div class="panel">
        <div class="panel-title">
            <span data-i18n="panel_alm">>> ALARM MATRIX (唤醒调度)</span>
            <span onclick="sendRaw('GET:SYNC')" style="cursor:pointer; color:var(--main-color)"
                data-i18n="btn_refresh">[ 刷新 ]</span>
        </div>
        <div id="alarm_list_container"></div>
        <div style="border-top: 1px dashed #333; padding-top: 10px; margin-top: 10px;">
            <div class="input-row"><label data-i18n="lbl_time">时间:</label><input type="datetime-local" class="input-box"
                    id="alm_time"></div>
            <div class="input-row"><label data-i18n="lbl_code">代号:</label><input type="text" class="input-box"
                    id="alm_name" value="早间唤醒"></div>
            <div class="input-row"><label data-i18n="lbl_cmd">指令:</label><input type="text" class="input-box"
                    id="alm_text" value="至..沉睡者..立刻清醒"></div>
            <button class="btn" onclick="addAlarm()" data-i18n="btn_alm_add">+ 添加并同步到终端</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">
            <span data-i18n="panel_sch">>> SCHEDULE (长期日程)</span>
            <span onclick="sendRaw('GET:SYNC')" style="cursor:pointer; color:var(--main-color)"
                data-i18n="btn_refresh">[ 刷新 ]</span>
        </div>
        <div id="sch_list_container"></div>
        <div style="border-top: 1px dashed #333; padding-top: 10px; margin-top: 10px;">
            <div class="input-row"><label data-i18n="lbl_st">时空:</label><input type="datetime-local" class="input-box"
                    id="sch_time"></div>
            <div class="input-row"><label data-i18n="lbl_title">标题:</label><input type="text" class="input-box"
                    id="sch_name" value="开会"></div>
            <div class="input-row"><label data-i18n="lbl_content">内容:</label><input type="text" class="input-box"
                    id="sch_text" value="至..大忙人..在十五分钟后到会议室"></div>
            <button class="btn" onclick="addSchedule()" data-i18n="btn_sch_add">+ 登记并同步到终端</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">
            <span data-i18n="panel_pre">>> PRESCRIPT LIBRARY (自定义指令池)</span>
            <span onclick="sendRaw('GET:SYNC')" style="cursor:pointer; color:var(--main-color)"
                data-i18n="btn_refresh">[ 刷新 ]</span>
        </div>
        <div id="pre_list_container"></div>

        <div style="border-top: 1px dashed #333; padding-top: 10px; margin-top: 10px;">

            <div
                style="font-size: 12px; color: #888; margin-bottom: 5px; display: flex; justify-content: space-between;">
                <span data-i18n="lbl_cloud">>> 云端记录档案 (点击提取):</span>
                <span onclick="loadCloudArchive()" style="cursor:pointer; color:#088;">[ RELOAD ]</span>
            </div>
            <div id="cloud_archive_window">
                <div style="color:#555; text-align:center; padding-top: 40px;">[ INITIALIZING... ]</div>
            </div>

            <input type="text" class="input-box" id="pre_text"
                style="width: 100%; margin-bottom: 10px; border-color: #088;" placeholder="输入新的指令文本..."
                data-i18n-ph="ph_pre">
            <button class="btn" onclick="addPre()" data-i18n="btn_pre_add">+ 注入自定义池</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title"><span data-i18n="panel_pom">>> POMODORO (专注预设)</span></div>
        <div class="input-row">
            <label data-i18n="lbl_slot">槽位:</label>
            <select class="input-box" id="pom_slot">
                <option value="0" data-i18n="opt_s0">槽位 0</option>
                <option value="1" data-i18n="opt_s1">槽位 1</option>
                <option value="2" data-i18n="opt_s2">槽位 2</option>
            </select>
        </div>
        <div class="input-row"><label data-i18n="lbl_name">名称:</label><input type="text" class="input-box" id="pom_name"
                value="极限心流模式"></div>
        <div class="input-row"><label data-i18n="lbl_work">专注(分):</label><input type="number" class="input-box"
                id="pom_work" value="45"></div>
        <div class="input-row"><label data-i18n="lbl_rest">休息(分):</label><input type="number" class="input-box"
                id="pom_rest" value="10"></div>
        <button class="btn" onclick="updatePom()" data-i18n="btn_pom_add">覆盖该槽位并重载</button>
    </div>

    <div class="panel">
        <div class="panel-title"><span data-i18n="title_wifi">>> WLAN CONFIG (网络密钥注入)</span></div>
        <input type="text" class="input-box" id="wifi_ssid" style="width: 100%; margin-bottom: 10px;"
            placeholder="输入 WiFi 名称 (SSID)" data-i18n-ph="ph_wifi_ssid">
        <input type="text" class="input-box" id="wifi_pass" style="width: 100%; margin-bottom: 10px;"
            placeholder="输入 WiFi 密码 (选填)" data-i18n-ph="ph_wifi_pass">
        <button class="btn" onclick="setWifi()" data-i18n="btn_wifi_set">下发密钥</button>
    </div>

    <script>
        // ==========================================
        // 多语言字典与动态引擎 (i18n Engine)
        // ==========================================
        let currentLang = 'zh';

        const i18n = {
            zh: {
                title: "Terminal Uplink",
                status_click: "(点击建立链接)",
                btn_refresh: "[ 刷新 ]",
                panel_txt: ">> TXT OVERRIDE (强制打断)",
                btn_txt: "传递指令",
                panel_alm: ">> ALARM MATRIX (唤醒调度)",
                lbl_time: "时间:", lbl_code: "代号:", lbl_cmd: "指令:",
                btn_alm_add: "+ 添加并同步到终端",
                panel_sch: ">> SCHEDULE (长期日程)",
                lbl_st: "时空:", lbl_title: "标题:", lbl_content: "内容:",
                btn_sch_add: "+ 登记并同步到终端",
                panel_pre: ">> PRESCRIPT LIBRARY (自定义指令池)",
                ph_pre: "输入新的指令文本...",
                btn_pre_add: "+ 注入自定义池",
                lbl_cloud: ">> 云端记录档案 (点击提取):",
                panel_pom: ">> POMODORO (专注预设)",
                lbl_slot: "槽位:", lbl_name: "名称:", lbl_work: "专注(分):", lbl_rest: "休息(分):",
                btn_pom_add: "覆盖该槽位并重载",
                opt_s0: "槽位 0", opt_s1: "槽位 1", opt_s2: "槽位 2",
                title_wifi: ">> WLAN CONFIG (网络密钥注入)",
                ph_wifi_ssid: "输入 WiFi 名称 (SSID)",
                ph_wifi_pass: "输入 WiFi 密码 (选填)",
                btn_wifi_set: "下发密钥",
                msg_wifi_empty: "WiFi 名称不能为空！",
                msg_wifi_sent: "网络密钥已通过 BLE 链路下发！",
                v_txt: "有内鬼,终止交易！",
                v_alm_n: "早间唤醒",
                v_alm_t: "至..沉睡者..立刻清醒",
                v_sch_n: "开会",
                v_sch_t: "至..大忙人..在十五分钟后到会议室",
                v_pom_n: "极限心流模式",
                msg_conn_err: "未建立连接",
                msg_param_err: "参数不完整",
                msg_empty: "内容不能为空",
                msg_no_alm: "( 终端目前无闹钟 )",
                msg_no_sch: "( 终端目前无未过期的日程 )",
                msg_no_pre: "( 终端目前无自定义指令 )",
                status_connecting: "SYS_STATUS: CONNECTING...<br><span style='font-size: 12px; color: #ff0;'>[等待配对]</span>",
                status_online: "SYS_STATUS: ONLINE<br><span style='font-size: 12px; color: #0f0;'>[同步完毕]</span>",
                status_offline: "SYS_STATUS: OFFLINE<br><span style='font-size: 12px; color: #f03;'>[连接断开]</span>"
            },
            en: {
                title: "Terminal Uplink",
                status_click: "(CLICK TO ESTABLISH LINK)",
                btn_refresh: "[ REFRESH ]",
                panel_txt: ">> TXT OVERRIDE",
                btn_txt: "TRANSMIT",
                panel_alm: ">> ALARM MATRIX",
                lbl_time: "Time:", lbl_code: "Code:", lbl_cmd: "Cmd:",
                btn_alm_add: "+ ADD & SYNC",
                panel_sch: ">> SCHEDULE",
                lbl_st: "Target:", lbl_title: "Title:", lbl_content: "Content:",
                btn_sch_add: "+ REGISTER & SYNC",
                panel_pre: ">> PRESCRIPT LIBRARY",
                ph_pre: "Enter new prescript text...",
                btn_pre_add: "+ INJECT TO POOL",
                lbl_cloud: ">> CLOUD ARCHIVE (CLICK TO EXTRACT):",
                panel_pom: ">> POMODORO PRESETS",
                lbl_slot: "Slot:", lbl_name: "Name:", lbl_work: "Work(m):", lbl_rest: "Rest(m):",
                btn_pom_add: "OVERWRITE SLOT",
                opt_s0: "Slot 0", opt_s1: "Slot 1", opt_s2: "Slot 2",
                title_wifi: ">> WLAN CONFIG INJECTION",

                btn_wifi_set: "INJECT CREDS",
                msg_wifi_empty: "SSID cannot be empty!",
                msg_wifi_sent: "WLAN Credentials Injected via BLE!",
                v_txt: "Do not go home until you finish reading the value of e",
                v_alm_n: "Morning Wake",
                v_alm_t: "To.. the sleeper.. wake up immediately",
                v_sch_n: "Meeting",
                v_sch_t: "To.. the busy one.. meeting room in 15 mins",
                v_pom_n: "Extreme Flow Mode",
                msg_conn_err: "Connection not established",
                msg_param_err: "Missing parameters",
                msg_empty: "Content cannot be empty",
                msg_no_alm: "( NO ALARMS IN TERMINAL )",
                msg_no_sch: "( NO ACTIVE SCHEDULES IN TERMINAL )",
                msg_no_pre: "( NO CUSTOM PRESCRIPTS )",
                status_connecting: "SYS_STATUS: CONNECTING...<br><span style='font-size: 12px; color: #ff0;'>[AWAITING PAIRING]</span>",
                status_online: "SYS_STATUS: ONLINE<br><span style='font-size: 12px; color: #0f0;'>[SYNC COMPLETE]</span>",
                status_offline: "SYS_STATUS: OFFLINE<br><span style='font-size: 12px; color: #f03;'>[CONNECTION LOST]</span>"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('langToggle').innerText = currentLang === 'zh' ? 'EN' : '中文';
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = i18n[currentLang][el.getAttribute('data-i18n')]; });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = i18n[currentLang][el.getAttribute('data-i18n-ph')]; });

            const otherLang = currentLang === 'zh' ? 'en' : 'zh';
            const checkAndSwap = (id, key) => { let el = document.getElementById(id); if (el.value === i18n[otherLang][key]) el.value = i18n[currentLang][key]; };
            checkAndSwap('txt_msg', 'v_txt'); checkAndSwap('alm_name', 'v_alm_n'); checkAndSwap('alm_text', 'v_alm_t');
            checkAndSwap('sch_name', 'v_sch_n'); checkAndSwap('sch_text', 'v_sch_t'); checkAndSwap('pom_name', 'v_pom_n');

            // 切换语言时，自动请求对应语言的数据库档案！
            if (bleCharacteristic) {
                document.getElementById('statusBox').innerHTML = i18n[currentLang].status_online;
                setTimeout(() => sendRaw('GET:SYNC:' + currentLang.toUpperCase()), 100);
            } else if (document.getElementById('statusBox').innerHTML.includes("OFFLINE")) {
                document.getElementById('statusBox').innerHTML = `SYS_STATUS: OFFLINE<br><span style="font-size: 12px; color: #888;">${i18n[currentLang].status_click}</span>`;
            }
            renderUI();
        }

        async function loadCloudArchive() {
            const container = document.getElementById('cloud_archive_window');
            container.innerHTML = `<div style="color:#088; text-align:center; padding-top: 40px;">[ FETCHING CLOUD API... ]</div>`;
            try {
                let res = await fetch('https://index.dimension-404.cloud/api/all');
                let data = await res.json();
                renderCloudItems(data);
            } catch (e) {
                console.warn("[CLOUD UPLINK] API 访问失败，启用离线缓存数据进行演示。");
                let mockData = [
                    { content: "致...在https://index.dimension-404.cloud/submit发布指令", author: "Anonymous" },
                    { content: "致…前往L公司，寻找金枝...", author: "Dante" },
                    { content: "在夜晚降临前，清理掉街道上所有的监控探头。", author: "System" }
                ];
                renderCloudItems(mockData);
            }
        }

        function renderCloudItems(dataList) {
            const container = document.getElementById('cloud_archive_window');
            container.innerHTML = "";

            if (!dataList || dataList.length === 0) {
                container.innerHTML = `<div style="color:#555; text-align:center; padding-top: 40px;">[ CLOUD DB EMPTY ]</div>`;
                return;
            }

            // 截取前 50 条渲染，防止海量数据卡死浏览器
            dataList.slice(0, 50).forEach(item => {
                let idText = "AUTHOR: " + (item.author ? item.author : "UNKNOWN");
                let contentText = item.content ? item.content : "";

                // 判断当前这条指令在“本次会话”中是否已经点过上传了
                let isUploaded = uploadedSessionItems.has(contentText);
                let btnClass = isUploaded ? 'del' : 'add';
                let btnIcon = isUploaded ? '✖' : '✓';

                let div = document.createElement('div');
                div.className = 'cloud-item';
                div.innerHTML = `
                    <div class="cloud-action-btn ${btnClass}">${btnIcon}</div>
                    <div class="cloud-content-wrapper">
                        <div class="cloud-id">${idText}</div>
                        <div class="cloud-content">${contentText}</div>
                    </div>
                `;

                // 【核心交互 1】：左侧按钮的 一键注入/撤销 逻辑
                let actionBtn = div.querySelector('.cloud-action-btn');
                actionBtn.onclick = (e) => {
                    e.stopPropagation(); // 阻止点击事件穿透到右侧文本区

                    if (uploadedSessionItems.has(contentText)) {
                        // 当前是 ✖ 状态 -> 执行一键物理删除，并变回 ✓
                        sendRaw(`PRE_DEL:${currentLang.toUpperCase()}:${contentText}`);
                        setTimeout(() => sendRaw('GET:SYNC:' + currentLang.toUpperCase()), 500);

                        uploadedSessionItems.delete(contentText);
                        actionBtn.className = 'cloud-action-btn add';
                        actionBtn.innerText = '✓';
                    } else {
                        // 当前是 ✓ 状态 -> 执行一键物理写入，并变成 ✖
                        sendRaw(`PRE:${currentLang.toUpperCase()}:${contentText}`);
                        setTimeout(() => sendRaw('GET:SYNC:' + currentLang.toUpperCase()), 500);

                        uploadedSessionItems.add(contentText);
                        actionBtn.className = 'cloud-action-btn del';
                        actionBtn.innerText = '✖';
                    }
                };

                // 【核心交互 2】：右侧文本区保持原有的“点击提取到下方输入框”逻辑
                let contentWrapper = div.querySelector('.cloud-content-wrapper');
                contentWrapper.onclick = () => {
                    let preInput = document.getElementById('pre_text');
                    preInput.value = contentText;
                    preInput.style.backgroundColor = "rgba(0,255,255,0.3)";
                    setTimeout(() => preInput.style.backgroundColor = "#000", 200);
                };

                container.appendChild(div);
            });
        }
        let bleCharacteristic = null;
        let syncTimeout;
        const SERVICE_UUID = "0000dead-0000-1000-8000-00805f9b34fb";
        const CHAR_UUID = "0000beef-0000-1000-8000-00805f9b34fb";
        let terminalAlarms = []; let terminalSchedules = []; let terminalPrescripts = [];
        let uploadedSessionItems = new Set(); // 【新增】：记录本次网页会话中已经点击上传的云端指令
        window.onload = () => {
            let now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset() + 60);
            document.getElementById('sch_time').value = now.toISOString().slice(0, 16);
            let almInit = new Date(); almInit.setMinutes(almInit.getMinutes() - almInit.getTimezoneOffset()); almInit.setHours(8, 0);
            document.getElementById('alm_time').value = almInit.toISOString().slice(0, 16);

            // 绑定所有的 [刷新] 按钮加上动态语言标识
            document.querySelectorAll('[data-i18n="btn_refresh"]').forEach(el => {
                el.onclick = () => sendRaw('GET:SYNC:' + currentLang.toUpperCase());
            });
            loadCloudArchive();
        };

        async function connectBLE() {
            const statusBox = document.getElementById('statusBox');
            try {
                statusBox.innerHTML = i18n[currentLang].status_connecting;
                const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'Terminal_01' }], optionalServices: [SERVICE_UUID] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHAR_UUID);
                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', handleRX);

                statusBox.innerHTML = i18n[currentLang].status_online;
                statusBox.style.borderColor = "#0f0"; statusBox.style.color = "#0f0";

                // 连接成功时带上当前网页语言去拉取数据
                setTimeout(() => sendRaw('GET:SYNC:' + currentLang.toUpperCase()), 500);

                device.addEventListener('gattserverdisconnected', () => {
                    bleCharacteristic = null;
                    statusBox.innerHTML = i18n[currentLang].status_offline;
                    statusBox.style.borderColor = "#f03"; statusBox.style.color = "#f03";
                });
            } catch (error) { alert("Error: " + error.message); }
        }

        function handleRX(event) {
            let val = new TextDecoder().decode(event.target.value);
            if (val === "SYNC:CLEAR") {
                terminalAlarms = []; terminalSchedules = []; terminalPrescripts = []; renderUI();
            } else if (val.startsWith("SYNC:ALM:")) {
                try { terminalAlarms.push(JSON.parse(val.substring(9))); renderUI(); } catch (e) { }
            } else if (val.startsWith("SYNC:SCH:")) {
                try { terminalSchedules.push(JSON.parse(val.substring(9))); renderUI(); } catch (e) { }
            } else if (val.startsWith("SYNC:PRE:")) {
                try { terminalPrescripts.push(JSON.parse(val.substring(9))); renderUI(); } catch (e) { }
            }

            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                document.getElementById('statusBox').innerHTML = currentLang === 'zh' ?
                    "SYS_STATUS: ONLINE<br><span style='font-size: 12px; color: #0f0;'>[ 数据库同步完毕 ]</span>" :
                    "SYS_STATUS: ONLINE<br><span style='font-size: 12px; color: #0f0;'>[ SYNC COMPLETE ]</span>";
            }, 300);
        }

        function renderUI() {
            let almHtml = terminalAlarms.length === 0 ? `<div style='color:#555; text-align:center; font-size:12px;'>${i18n[currentLang].msg_no_alm}</div>` : "";
            terminalAlarms.forEach(a => {
                let hh = String(a.h).padStart(2, '0'); let mm = String(a.m).padStart(2, '0');
                almHtml += `<div class="list-item">
                    <div class="item-info"><span class="item-time">${hh}:${mm}</span> &nbsp; ${a.n}<br><span style="color:#666; font-size:12px;">${a.t}</span></div>
                    <button class="btn-danger" onclick="executeDelete('ALM_DEL:${a.n}')">✖</button>
                </div>`;
            });
            document.getElementById('alarm_list_container').innerHTML = almHtml;

            let schHtml = terminalSchedules.length === 0 ? `<div style='color:#555; text-align:center; font-size:12px;'>${i18n[currentLang].msg_no_sch}</div>` : "";
            terminalSchedules.forEach(s => {
                let niceDate = s.dt.replace('T', ' ');
                schHtml += `<div class="list-item">
                    <div class="item-info"><span class="item-time">${niceDate}</span><br>📌 ${s.n}<br><span style="color:#666; font-size:12px;">${s.t}</span></div>
                    <button class="btn-danger" onclick="executeDelete('SCH_DEL:${s.n}')">✖</button>
                </div>`;
            });
            document.getElementById('sch_list_container').innerHTML = schHtml;

            let preHtml = terminalPrescripts.length === 0 ? `<div style='color:#555; text-align:center; font-size:12px;'>${i18n[currentLang].msg_no_pre}</div>` : "";
            terminalPrescripts.forEach(p => {
                preHtml += `<div class="list-item">
                    <div class="item-info"><span style="color:#0ff;">${p.t}</span></div>
                    <button class="btn-danger" onclick="executeDelete('PRE_DEL:${currentLang.toUpperCase()}:${p.t}')">✖</button>
                </div>`;
            });
            document.getElementById('pre_list_container').innerHTML = preHtml;
        }

        async function sendRaw(cmdStr) {
            if (!bleCharacteristic) return alert(i18n[currentLang].msg_conn_err);
            try {
                await bleCharacteristic.writeValue(new TextEncoder().encode(cmdStr));
                document.body.style.backgroundColor = "#003333"; setTimeout(() => document.body.style.backgroundColor = "#050505", 100);
            } catch (error) { console.error(error); }
        }

        function executeDelete(cmd) { sendRaw(cmd); setTimeout(() => sendRaw('GET:SYNC:' + currentLang.toUpperCase()), 500); }

        function addAlarm() {
            let dt = document.getElementById('alm_time').value; let n = document.getElementById('alm_name').value.replace(/:/g, "："); let txt = document.getElementById('alm_text').value.replace(/:/g, "：");
            if (!dt || !n) return alert(i18n[currentLang].msg_param_err);
            let timePart = dt.split('T')[1]; let [h, m] = timePart.split(':');
            sendRaw(`ALM:${h}:${m}:${n}:${txt}`); setTimeout(() => sendRaw('GET:SYNC:' + currentLang.toUpperCase()), 500);
        }

        function addSchedule() {
            let dt = document.getElementById('sch_time').value; let n = document.getElementById('sch_name').value.replace(/:/g, "："); let txt = document.getElementById('sch_text').value.replace(/:/g, "：");
            if (!dt || !n) return alert(i18n[currentLang].msg_param_err);
            let [y, mo, d] = dt.split('T')[0].split('-'); let [h, m] = dt.split('T')[1].split(':');
            sendRaw(`SCH:${y}:${mo}:${d}:${h}:${m}:${n}:${txt}`); setTimeout(() => sendRaw('GET:SYNC:' + currentLang.toUpperCase()), 500);
        }

        function addPre() {
            let txt = document.getElementById('pre_text').value.replace(/:/g, "：");
            if (!txt) return alert(i18n[currentLang].msg_empty);
            // 【核心修改】：发送带语言标签的指令
            sendRaw(`PRE:${currentLang.toUpperCase()}:${txt}`);
            setTimeout(() => sendRaw('GET:SYNC:' + currentLang.toUpperCase()), 500);
            document.getElementById('pre_text').value = "";
        }

        function updatePom() {
            let slot = document.getElementById('pom_slot').value; let n = document.getElementById('pom_name').value.replace(/:/g, "："); let w = document.getElementById('pom_work').value; let r = document.getElementById('pom_rest').value;
            sendRaw(`POM:${slot}:${n}:${w}:${r}`);
        }

        function setWifi() {
            let ssid = document.getElementById('wifi_ssid').value.trim(); let pass = document.getElementById('wifi_pass').value.trim();
            if (!ssid) return alert(i18n[currentLang].msg_wifi_empty);
            sendRaw(`WIFI:${ssid}:${pass}`);
            document.getElementById('wifi_pass').value = "";
            alert(i18n[currentLang].msg_wifi_sent);
        }
    </script>
</body>

</html>
